                        name="number-input"

                    >
                </div>
            </div>
        
            <div class="grid grid-cols-3 gap-2">
                <button title="Reset" class="proc-reset h-12 flex items-center justify-center text-slate-400 hover:text-rose-400 bg-slate-800/60 hover:bg-slate-800 border border-slate-700/50 active:scale-95 rounded-2xl transition-all duration-150 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                </button>
                
                <button title="runProcessControlsjsjs" id="runButton" class="proc-run h-12 flex items-center justify-center text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 active:scale-95 rounded-2xl transition-all duration-150 shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30">

                        <path d="M8 5v14l11-7z"/>

                <button title="Skip all remainings" class="proc-skip h-12 flex items-center justify-center text-slate-400 hover:text-white bg-slate-800/60 hover:bg-slate-800 border border-slate-700/50 active:scale-95 rounded-2xl transition-all duration-150 shadow-sm">

                        <polygon points="5 4 15 12 5 20 5 4"/>
                        <line x1="19" x2="19" y1="5" y2="19"/>
