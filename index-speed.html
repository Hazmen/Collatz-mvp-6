        <script>
            // === Speed Controller Logic ===

            const speedSlider = document.getElementById('speed-slider');
            const speedDisplay = document.querySelector('.speed-display');
            const batchInput = document.getElementById('batch-input');
            const batchDecr = document.getElementById('batch-decr');
            const batchIncr = document.getElementById('batch-incr');

            const speedState = {
                intervalMs: 0,
                batchSize: 1,
            };

            // --- Slider ---
            function formatSpeed(ms) {
                if (ms === 0) return 'Выкл';
                if (ms < 1000) return ms + 'ms';
                const sec = (ms / 1000).toFixed(1).replace(/\.0$/, '');
                return sec + 'c';
            }

            function updateSpeedDisplay() {
                const ms = parseInt(speedSlider.value, 10);
                speedState.intervalMs = ms;
                speedDisplay.textContent = formatSpeed(ms);
                document.querySelectorAll('.speed-preset').forEach(btn => {
                    const val = parseInt(btn.dataset.ms, 10);
                    btn.classList.toggle('bg-indigo-500/20', val === ms);
                    btn.classList.toggle('border-indigo-500/40', val === ms);
                    btn.classList.toggle('text-indigo-300', val === ms);
                    btn.classList.toggle('bg-slate-800/40', val !== ms);
                    btn.classList.toggle('border-slate-700/30', val !== ms);
                    btn.classList.toggle('text-slate-400', val !== ms);
                });
            }

            speedSlider.addEventListener('input', updateSpeedDisplay);

            // --- Preset buttons ---
            document.querySelectorAll('.speed-preset').forEach(btn => {
                btn.addEventListener('click', () => {
                    speedSlider.value = btn.dataset.ms;
                    updateSpeedDisplay();
                });
            });

            // --- Batch input ---
            function clampBatch(val) {
                return Math.max(1, Math.min(10000, Math.round(val)));
            }

            function updateBatchDisplay() {
                const val = clampBatch(batchInput.value);
                batchInput.value = val;
                speedState.batchSize = val;
                document.querySelectorAll('.batch-preset').forEach(btn => {
                    const bv = parseInt(btn.dataset.batch, 10);
                    btn.classList.toggle('bg-indigo-500/20', bv === val);
                    btn.classList.toggle('border-indigo-500/40', bv === val);
                    btn.classList.toggle('text-indigo-300', bv === val);
                    btn.classList.toggle('bg-slate-800/30', bv !== val);
                    btn.classList.toggle('border-slate-700/20', bv !== val);
                    btn.classList.toggle('text-slate-500', bv !== val);
                });
            }

            batchInput.addEventListener('input', updateBatchDisplay);
            batchInput.addEventListener('change', updateBatchDisplay);

            batchDecr.addEventListener('click', () => {
                batchInput.value = clampBatch(parseInt(batchInput.value, 10) - 1);
                updateBatchDisplay();
            });
            batchIncr.addEventListener('click', () => {
                batchInput.value = clampBatch(parseInt(batchInput.value, 10) + 1);
                updateBatchDisplay();
            });

            // --- Batch presets ---
            document.querySelectorAll('.batch-preset').forEach(btn => {
                btn.addEventListener('click', () => {
                    batchInput.value = btn.dataset.batch;
                    updateBatchDisplay();
                });
            });

            // --- Initialize display ---
            updateSpeedDisplay();
            updateBatchDisplay();

            // Expose state globally for other scripts
            window.__speedState = speedState;
        </script>
